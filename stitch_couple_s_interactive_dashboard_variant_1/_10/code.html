<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Task Edit &amp; Interaction</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e8e830",
                        "background-light": "#f8f8f6",
                        "background-dark": "#212111",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center p-4">
<!-- Modal Overlay -->
<div class="fixed inset-0 bg-black/40 backdrop-blur-sm z-40 transition-opacity"></div>
<!-- Modal Content -->
<div class="relative w-full max-w-[520px] bg-white dark:bg-[#2a2a20] rounded-xl shadow-2xl z-50 overflow-hidden border border-[#e5e5e0] dark:border-[#3a3a30]">
<!-- Header -->
<div class="px-8 pt-8 pb-4 flex justify-between items-start">
<div>
<h2 class="text-slate-900 dark:text-slate-100 text-2xl font-bold leading-tight">Edit Task</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Make plans together ✨</p>
</div>
<button class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
<span class="material-symbols-outlined !text-[28px]">close</span>
</button>
</div>
<!-- Form Content -->
<div class="px-8 py-2 flex flex-col gap-6">
<!-- Task Name Input -->
<label class="flex flex-col gap-2 group">
<span class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Task Name</span>
<div class="flex items-center bg-background-light dark:bg-[#33332a] rounded-xl p-1 focus-within:ring-2 focus-within:ring-primary/50 transition-all border border-transparent focus-within:border-primary">
<input class="flex-1 bg-transparent border-none text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:ring-0 px-4 py-3 text-base font-medium" placeholder="What needs to be done?" type="text" value="Grocery Shopping for Dinner"/>
<div class="w-10 h-10 flex items-center justify-center text-primary dark:text-primary/90 mr-1 bg-primary/10 rounded-lg">
<span class="material-symbols-outlined">edit</span>
</div>
</div>
</label>
<!-- Assignee Selection -->
<div class="flex flex-col gap-2">
<span class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Assign To</span>
<div class="flex bg-background-light dark:bg-[#33332a] p-1.5 rounded-full relative">
<!-- Radio Inputs Hidden but Functional -->
<label class="flex-1 relative z-10 cursor-pointer">
<input class="peer sr-only" name="assignee" type="radio"/>
<div class="h-10 w-full rounded-full flex items-center justify-center gap-2 text-slate-500 peer-checked:bg-white dark:peer-checked:bg-[#44443a] peer-checked:text-slate-900 dark:peer-checked:text-white peer-checked:shadow-sm transition-all font-medium text-sm">
<span class="material-symbols-outlined !text-[18px]">group</span>
                            Both
                        </div>
</label>
<label class="flex-1 relative z-10 cursor-pointer">
<input checked="" class="peer sr-only" name="assignee" type="radio"/>
<div class="h-10 w-full rounded-full flex items-center justify-center gap-2 text-slate-500 peer-checked:bg-white dark:peer-checked:bg-[#44443a] peer-checked:text-slate-900 dark:peer-checked:text-white peer-checked:shadow-sm transition-all font-medium text-sm">
<span class="material-symbols-outlined !text-[18px]">face</span>
                            Him
                        </div>
</label>
<label class="flex-1 relative z-10 cursor-pointer">
<input class="peer sr-only" name="assignee" type="radio"/>
<div class="h-10 w-full rounded-full flex items-center justify-center gap-2 text-slate-500 peer-checked:bg-white dark:peer-checked:bg-[#44443a] peer-checked:text-slate-900 dark:peer-checked:text-white peer-checked:shadow-sm transition-all font-medium text-sm">
<span class="material-symbols-outlined !text-[18px]">face_3</span>
                            Her
                        </div>
</label>
</div>
</div>
<!-- Due Date & Time -->
<div class="grid grid-cols-2 gap-4">
<label class="flex flex-col gap-2">
<span class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Due Date</span>
<div class="flex items-center bg-background-light dark:bg-[#33332a] rounded-xl p-1 hover:bg-primary/5 dark:hover:bg-primary/10 transition-colors cursor-pointer group">
<div class="flex-1 px-4 py-3 text-slate-900 dark:text-slate-100 font-medium">Oct 24, 2023</div>
<div class="w-10 h-10 flex items-center justify-center text-slate-400 group-hover:text-primary transition-colors">
<span class="material-symbols-outlined">calendar_month</span>
</div>
</div>
</label>
<label class="flex flex-col gap-2">
<span class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Time</span>
<div class="flex items-center bg-background-light dark:bg-[#33332a] rounded-xl p-1 hover:bg-primary/5 dark:hover:bg-primary/10 transition-colors cursor-pointer group">
<div class="flex-1 px-4 py-3 text-slate-900 dark:text-slate-100 font-medium">6:30 PM</div>
<div class="w-10 h-10 flex items-center justify-center text-slate-400 group-hover:text-primary transition-colors">
<span class="material-symbols-outlined">schedule</span>
</div>
</div>
</label>
</div>
<!-- Sweet Message / Comment -->
<label class="flex flex-col gap-2">
<span class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Leave a note</span>
<div class="relative">
<textarea class="w-full bg-background-light dark:bg-[#33332a] rounded-xl border-none focus:ring-2 focus:ring-primary/50 p-4 min-h-[100px] text-slate-900 dark:text-slate-100 placeholder-slate-400 resize-none text-sm leading-relaxed" placeholder="Add a sweet message or details..."></textarea>
<div class="absolute bottom-3 right-3 flex gap-2">
<button class="p-1.5 rounded-full hover:bg-primary/20 text-slate-400 hover:text-primary-dark transition-colors" title="Add Voice Note">
<span class="material-symbols-outlined !text-[20px]">mic</span>
</button>
<button class="p-1.5 rounded-full hover:bg-primary/20 text-slate-400 hover:text-primary-dark transition-colors" title="Add Image">
<span class="material-symbols-outlined !text-[20px]">image</span>
</button>
</div>
</div>
</label>
</div>
<!-- Footer / Actions -->
<div class="px-8 pb-8 pt-6 mt-4 flex items-center justify-between gap-4 border-t border-slate-100 dark:border-[#3a3a30]">
<!-- Nudge Button (Cat Ears Style Concept) -->
<button class="group relative flex items-center justify-center w-14 h-14 bg-[#fff8e1] dark:bg-[#3a3a2a] text-[#ffb74d] rounded-2xl hover:bg-[#ffecb3] dark:hover:bg-[#4a4a3a] transition-all shadow-sm hover:shadow-md hover:-translate-y-0.5" title="Nudge TA">
<!-- Cat Ears Decoration using pseudo-elements conceptualized in CSS, here using absolute divs for explicit structure -->
<div class="absolute -top-2 left-2 w-3 h-3 bg-[#fff8e1] dark:bg-[#3a3a2a] group-hover:bg-[#ffecb3] dark:group-hover:bg-[#4a4a3a] rotate-45 rounded-sm transition-colors"></div>
<div class="absolute -top-2 right-2 w-3 h-3 bg-[#fff8e1] dark:bg-[#3a3a2a] group-hover:bg-[#ffecb3] dark:group-hover:bg-[#4a4a3a] rotate-45 rounded-sm transition-colors"></div>
<span class="material-symbols-outlined relative z-10 !text-[28px] animate-pulse">notifications_active</span>
</button>
<div class="flex items-center gap-3 flex-1 justify-end">
<button class="px-6 py-3.5 rounded-xl text-slate-500 font-semibold hover:bg-slate-100 dark:hover:bg-[#33332a] dark:text-slate-300 transition-colors">
                    Delete
                </button>
<button class="px-8 py-3.5 rounded-xl bg-primary text-[#4d4d10] font-bold shadow-lg shadow-primary/30 hover:shadow-primary/50 hover:bg-[#eaea45] transition-all active:scale-95 flex items-center gap-2">
<span class="material-symbols-outlined !text-[20px]">check</span>
                    Save Changes
                </button>
</div>
</div>
</div>
</body></html>
